services:
  - type: web
    name: datamart-backend
    env: python3
    plan: free # Or your preferred plan
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn -w 4 -k uvicorn.workers.UvicornWorker app.main:app"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: datamart-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true # Let Render generate a secure secret
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: DATAMART_API_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://your-frontend-domain.com # Change this

  - type: psql
    name: datamart-db
    plan: free # Or your preferred plan
    ipAllowList: [] # Allows access from anywhere, or restrict to your services